# ZMouse example config.
#
# Live location (macOS): ~/Library/Application Support/zmouse/config.toml
# Easiest way to build one: the GUI editor (menu bar -> "Edit mappings…", or `zmouse edit`).
# Use `zmouse probe` to discover a device's vendor/product ids and its button numbers.

# Global scroll-wheel cleanup (applies to discrete wheels only; trackpads are never touched).
[scroll]
jitter_filter = false      # drop spurious opposite-direction ticks from a worn encoder
reversal_guard_ms = 80     # an opposite tick within this window is treated as a glitch
boost_weak_ticks = false   # floor a slow tick to a full detent so pixel-precise apps don't ignore it
min_tick_pixels = 10       # pixels a single tick should move (~10 = one normal detent)

[[device]]
name = "ROG Chakram"       # human-friendly name for the whole physical device

# A device is matched by its identities. The SAME physical mouse can present several — its 2.4 GHz
# dongle vs Bluetooth, or a split pointer + keyboard interface — and they are all equal: every
# identity shares the mappings below. Each identity may carry a friendly label.
[[device.identity]]
label = "2.4GHz dongle"    # optional; just for your reference
vendor_id = 0x1532         # preferred: USB vendor/product id is stable across reconnects
product_id = 0x00b7
[[device.identity]]
label = "Bluetooth"
vendor_id = 0x1532
product_id = 0x00aa
[[device.identity]]
registry_id = 4295298668   # fallback: a registry id, for an interface with no vendor/product id

[[device.mapping]]
button = 3                 # "back" (see `zmouse probe` for button numbers)
action = { type = "keystroke", key = "c", mods = ["cmd"] }

[[device.mapping]]
button = 4                 # "forward"
action = { type = "button", button = 2 }   # -> middle click

[[device.mapping]]
button = 5
action = { type = "disabled" }              # swallow the button entirely

# An MMO mouse's thumb buttons often emit keystrokes rather than mouse buttons. Remap them by the
# key they emit under [[device.key]] — only keys from THIS device are affected, never a real keyboard.
[[device.key]]
key = "7"                  # the key the button types by default
action = { type = "keystroke", key = "v", mods = ["cmd"] }
